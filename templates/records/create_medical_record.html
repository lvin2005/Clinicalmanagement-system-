{% extends 'base.html' %}
{% load static %}

{% block title %}Add Medical Record - Clinical Portal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Add Medical Record</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="patient" class="form-label">Patient</label>
                            <select name="patient" id="patient" class="form-select" required>
                                <option value="">Select Patient</option>
                                {% for patient in patients %}
                                    <option value="{{ patient.pk }}">{{ patient.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="doctor" class="form-label">Doctor</label>
                            <select name="doctor" id="doctor" class="form-select" required>
                                <option value="">Select Doctor</option>
                                {% for doctor in doctors %}
                                    <option value="{{ doctor.pk }}">Dr. {{ doctor.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="record_type" class="form-label">Record Type</label>
                            <select name="record_type" id="record_type" class="form-select" required>
                                <option value="">Select Type</option>
                                {% for type_value, type_label in record_types %}
                                    <option value="{{ type_value }}">{{ type_label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="record_date" class="form-label">Record Date</label>
                            <input type="datetime-local" name="record_date" id="record_date" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" name="title" id="title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea name="description" id="description" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="diagnosis" class="form-label">Diagnosis</label>
                        <textarea name="diagnosis" id="diagnosis" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="treatment" class="form-label">Treatment</label>
                        <textarea name="treatment" id="treatment" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="prescription" class="form-label">Prescription</label>
                        <textarea name="prescription" id="prescription" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Additional Notes</label>
                        <textarea name="notes" id="notes" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_confidential" id="is_confidential" class="form-check-input">
                        <label for="is_confidential" class="form-check-label">Mark as Confidential</label>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'records:list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Add Medical Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
